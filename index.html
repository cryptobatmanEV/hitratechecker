<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const BDL_KEY = "296a4c03-94ec-4cfd-a472-8e4d464c9167";

function getCurrentSeason(sport) {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth() + 1;
  if (sport === "NBA") return month >= 10 ? year : year - 1;
  return year;
}

const NBA_TEAMS = {
  1:{n:"Atlanta Hawks",a:"ATL"},2:{n:"Boston Celtics",a:"BOS"},
  3:{n:"Brooklyn Nets",a:"BKN"},4:{n:"Charlotte Hornets",a:"CHA"},
  5:{n:"Chicago Bulls",a:"CHI"},6:{n:"Cleveland Cavaliers",a:"CLE"},
  7:{n:"Dallas Mavericks",a:"DAL"},8:{n:"Denver Nuggets",a:"DEN"},
  9:{n:"Detroit Pistons",a:"DET"},10:{n:"Golden State Warriors",a:"GSW"},
  11:{n:"Houston Rockets",a:"HOU"},12:{n:"Indiana Pacers",a:"IND"},
  13:{n:"LA Clippers",a:"LAC"},14:{n:"Los Angeles Lakers",a:"LAL"},
  15:{n:"Memphis Grizzlies",a:"MEM"},16:{n:"Miami Heat",a:"MIA"},
  17:{n:"Milwaukee Bucks",a:"MIL"},18:{n:"Minnesota Timberwolves",a:"MIN"},
  19:{n:"New Orleans Pelicans",a:"NOP"},20:{n:"New York Knicks",a:"NYK"},
  21:{n:"Oklahoma City Thunder",a:"OKC"},22:{n:"Orlando Magic",a:"ORL"},
  23:{n:"Philadelphia 76ers",a:"PHI"},24:{n:"Phoenix Suns",a:"PHX"},
  25:{n:"Portland Trail Blazers",a:"POR"},26:{n:"Sacramento Kings",a:"SAC"},
  27:{n:"San Antonio Spurs",a:"SAS"},28:{n:"Toronto Raptors",a:"TOR"},
  29:{n:"Utah Jazz",a:"UTA"},30:{n:"Washington Wizards",a:"WAS"},
};

const NBA_STATS = [
  {label:"Points",          calc:g=>g.pts},
  {label:"Rebounds",        calc:g=>g.reb},
  {label:"Assists",         calc:g=>g.ast},
  {label:"Steals",          calc:g=>g.stl},
  {label:"Blocks",          calc:g=>g.blk},
  {label:"3-Pointers Made", calc:g=>g.fg3m},
  {label:"Turnovers",       calc:g=>g.turnover},
  {label:"Pts+Reb+Ast",     calc:g=>(g.pts||0)+(g.reb||0)+(g.ast||0)},
  {label:"Pts+Reb",         calc:g=>(g.pts||0)+(g.reb||0)},
  {label:"Pts+Ast",         calc:g=>(g.pts||0)+(g.ast||0)},
  {label:"Reb+Ast",         calc:g=>(g.reb||0)+(g.ast||0)},
  {label:"Stl+Blk",         calc:g=>(g.stl||0)+(g.blk||0)},
];
const MLB_HIT = [
  {label:"Hits",                calc:s=>s.hits},
  {label:"Total Bases",         calc:s=>{const sg=(s.hits||0)-(s.doubles||0)-(s.triples||0)-(s.homeRuns||0);return sg+2*(s.doubles||0)+3*(s.triples||0)+4*(s.homeRuns||0);}},
  {label:"Home Runs",           calc:s=>s.homeRuns},
  {label:"RBIs",                calc:s=>s.rbi},
  {label:"Runs",                calc:s=>s.runs},
  {label:"Stolen Bases",        calc:s=>s.stolenBases},
  {label:"Strikeouts (Batter)", calc:s=>s.strikeOuts},
  {label:"Walks",               calc:s=>s.baseOnBalls},
  {label:"Hits+Runs+RBIs",      calc:s=>(s.hits||0)+(s.runs||0)+(s.rbi||0)},
];
const MLB_PIT = [
  {label:"Strikeouts",   calc:s=>s.strikeOuts},
  {label:"Hits Allowed", calc:s=>s.hits},
  {label:"Earned Runs",  calc:s=>s.earnedRuns},
  {label:"Walks",        calc:s=>s.baseOnBalls},
  {label:"Outs Recorded",calc:s=>{const p=(s.inningsPitched||"0").toString().split(".");return parseInt(p[0])*3+(parseInt(p[1])||0);}},
];
const NHL_STATS = [
  {label:"Goals",         calc:g=>g.goals},
  {label:"Assists",       calc:g=>g.assists},
  {label:"Points",        calc:g=>(g.goals||0)+(g.assists||0)},
  {label:"Shots on Goal", calc:g=>g.shots},
  {label:"Hits",          calc:g=>g.hits},
  {label:"Blocked Shots", calc:g=>g.blockedShots},
  {label:"PP Points",     calc:g=>(g.powerPlayGoals||0)+(g.powerPlayAssists||0)},
];

// ── Parse NBA minutes ─────────────────────────────────────────────────────────
function parseMin(m) {
  if (!m || m === "" || m === null) return 0;
  const s = m.toString().trim();
  if (s.includes(":")) return parseInt(s.split(":")[0]) || 0;
  return parseInt(s) || 0;
}

// ── API ───────────────────────────────────────────────────────────────────────
async function nbaProxy(path, params) {
  const r = await fetch(`/api/nba?path=${encodeURIComponent(path)}&params=${encodeURIComponent(params)}`);
  if (r.status === 429) throw new Error("NBA: Daily rate limit reached (100 req/day free tier). Try again tomorrow.");
  if (!r.ok) throw new Error(`NBA request failed (${r.status})`);
  return r.json();
}

async function searchNBA(q) {
  const d = await nbaProxy('players', `search=${encodeURIComponent(q)}&per_page=10`);
  return (d.data||[]).map(p=>({
    id:p.id, name:`${p.first_name} ${p.last_name}`,
    sub:p.team?.full_name||"", teamId:p.team?.id
  }));
}

async function fetchNBASeasons(playerId, seasons) {
  const params = `player_ids[]=${playerId}&${seasons.map(s=>`seasons[]=${s}`).join("&")}&per_page=100`;
  let all=[], page=1, totalPages=1;
  while (page <= totalPages && page <= 5) {
    const d = await nbaProxy('stats', `${params}&page=${page}`);
    totalPages = d.meta?.total_pages || 1;
    const played = (d.data||[]).filter(g => parseMin(g.min) > 0);
    played.forEach(g => {
      const isHome = g.game.home_team_id === g.team.id;
      const oppId  = isHome ? g.game.visitor_team_id : g.game.home_team_id;
      g._opp     = NBA_TEAMS[oppId]?.a || `T${oppId}`;
      g._oppFull = NBA_TEAMS[oppId]?.n || "";
      g._date    = (g.game.date||"").split("T")[0];
      g._season  = g.game.season;
    });
    all = all.concat(played);
    page++;
  }
  return all.sort((a,b) => new Date(b._date) - new Date(a._date));
}

async function searchMLB(q) {
  const r = await fetch(
    `https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(q)}&sportId=1&active=true`
  );
  const text = await r.text();
  if (!r.ok) throw new Error(`MLB search failed (${r.status})`);
  const d = JSON.parse(text);
  return (d.people||[]).slice(0,10).map(p=>({
    id:p.id, name:p.fullName,
    sub:`${p.primaryPosition?.abbreviation||""} · ${p.currentTeam?.name||""}`.trim()
  }));
}

async function fetchMLBSeasons(playerId, group, seasons) {
  let all = [];
  for (const season of seasons) {
    try {
      const r = await fetch(
        `https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&season=${season}&sportId=1&group=${group}`
      );
      if (!r.ok) continue;
      const d = await r.json();
      const splits = d.stats?.[0]?.splits || [];
      splits.forEach(s => {
        all.push({stat:s.stat, _date:s.date, _opp:s.opponent?.name||"", _oppFull:s.opponent?.name||"", _season:season});
      });
    } catch(e) { /* skip failed seasons */ }
  }
  return all.reverse();
}

async function nhlProxy(url) {
  const r = await fetch(`/api/nhl?url=${encodeURIComponent(url)}`);
  if (!r.ok) throw new Error(`NHL request failed (${r.status})`);
  return r.json();
}

async function searchNHL(q) {
  try {
    const d = await nhlProxy(`https://search.d3.nhle.com/api/v1/search?q=${encodeURIComponent(q)}&type=player&active=true`);
    if (d && d.length > 0) {
      return d.slice(0,10).map(p=>({
        id: p.playerId, name: p.name,
        sub: `${p.positionCode||""} · ${p.teamAbbrev||""}`.trim()
      }));
    }
  } catch(e) {}

  // Fallback suggest API
  const d2 = await nhlProxy(`https://suggest.svc.nhl.com/svc/suggest/v1/minactiveplayers/${encodeURIComponent(q)}/10`);
  const players = d2.suggestions || [];
  if (!players.length) throw new Error("No NHL players found. Try the last name only.");
  return players.slice(0,10).map(p => {
    const pts = p.split("|");
    return { id: pts[0], name: `${pts[3]} ${pts[2]}`, sub: `${pts[5]||""} · ${pts[4]||""}`.trim() };
  });
}

async function fetchNHLSeasons(playerId, seasons) {
  let all = [];
  try {
    const d = await nhlProxy(`https://api-web.nhle.com/v1/player/${playerId}/game-log/now`);
    (d.gameLog||[]).forEach(g => {
      all.push({...g, _date:g.gameDate, _opp:g.opponentAbbrev||"", _oppFull:g.opponentAbbrev||"", _season:"current"});
    });
  } catch(e) {}

  if (seasons.length > 1) {
    for (const s of seasons.slice(1)) {
      const seasonId = `${s}${s+1}`;
      try {
        const d = await nhlProxy(`https://api-web.nhle.com/v1/player/${playerId}/game-log/${seasonId}/2`);
        (d.gameLog||[]).forEach(g => {
          all.push({...g, _date:g.gameDate, _opp:g.opponentAbbrev||"", _oppFull:g.opponentAbbrev||"", _season:s});
        });
      } catch(e) {}
    }
  }
  return all.sort((a,b) => new Date(b._date) - new Date(a._date));
}

// ── Calc ──────────────────────────────────────────────────────────────────────
function hitRate(games, valFn, line, ou) {
  const vals = games.map(valFn).filter(v => v != null && !isNaN(v));
  if (!vals.length) return null;
  const hits = vals.filter(v => ou==="over" ? v > line : v < line).length;
  const avg  = vals.reduce((a,b)=>a+b,0) / vals.length;
  return { rate: Math.round(hits/vals.length*100), hits, total: vals.length, avg: Math.round(avg*10)/10 };
}

function oppMatch(game, query) {
  if (!query.trim()) return false;
  const q = query.trim().toLowerCase();
  return (game._opp||"").toLowerCase().includes(q) ||
         (game._oppFull||"").toLowerCase().includes(q);
}

function rateColor(r) { return r>=65?"#00dc6e":r>=50?"#ffc800":"#ff6b6b"; }
function rateCls(r)   { return r>=65?"rate-hot":r>=50?"rate-mid":"rate-cold"; }

function RateCard({label, data, empty}) {
  if (!data) return (
    <div className="rate-card rate-grey">
      <div className="lbl">{label}</div>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginTop:10}}>{empty||"—"}</div>
    </div>
  );
  return (
    <div className={`rate-card ${rateCls(data.rate)}`}>
      <div className="lbl">{label}</div>
      <div className="pct" style={{color:rateColor(data.rate)}}>{data.rate}%</div>
      <div className="frac">{data.hits}/{data.total}</div>
      <div className="avg">avg {data.avg}</div>
    </div>
  );
}

// ── Main component ────────────────────────────────────────────────────────────
function HitRateChecker() {
  const [sport,setSport]       = useState("NBA");
  const [query,setQuery]       = useState("");
  const [results,setResults]   = useState([]);
  const [player,setPlayer]     = useState(null);
  const [statIdx,setStatIdx]   = useState(0);
  const [mlbGrp,setMlbGrp]    = useState("hitting");
  const [line,setLine]         = useState("");
  const [ou,setOu]             = useState("over");
  const [scope,setScope]       = useState("season"); // "season" | "lifetime"
  const [h2hInput,setH2hInput] = useState("");
  const [h2hActive,setH2hActive] = useState("");
  const [loading,setLoading]   = useState(false);
  const [searching,setSearch]  = useState(false);
  const [error,setError]       = useState("");
  const [debugInfo,setDebug]   = useState("");
  const [gameLog,setGameLog]   = useState([]);
  const [showDrop,setShowDrop] = useState(false);
  const timer = useRef(null);
  const wrap  = useRef(null);

  const statList = sport==="NBA"?NBA_STATS:sport==="NHL"?NHL_STATS:mlbGrp==="hitting"?MLB_HIT:MLB_PIT;

  useEffect(()=>{
    setQuery("");setResults([]);setPlayer(null);setStatIdx(0);
    setLine("");setGameLog([]);setError("");setDebug("");setH2hInput("");setH2hActive("");
  },[sport]);
  useEffect(()=>{ setStatIdx(0); },[mlbGrp]);
  useEffect(()=>{
    const h=e=>{if(wrap.current&&!wrap.current.contains(e.target))setShowDrop(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  const handleQuery = v => {
    setQuery(v); setPlayer(null); setGameLog([]); setError(""); setDebug("");
    clearTimeout(timer.current);
    if(v.length<2){setResults([]);setShowDrop(false);return;}
    timer.current = setTimeout(async()=>{
      setSearch(true);
      try {
        let res=[];
        if(sport==="NBA") res = await searchNBA(v);
        else if(sport==="MLB") res = await searchMLB(v);
        else res = await searchNHL(v);
        setResults(res);
        setShowDrop(true);
        if(!res.length) setDebug("No players found. Try spelling out the full name.");
      } catch(e){ setError(e.message); }
      finally{ setSearch(false); }
    },450);
  };

  const selectPlayer = p => {
    setPlayer(p); setQuery(p.name); setShowDrop(false); setResults([]); setGameLog([]); setError(""); setDebug("");
  };

  const checkHistory = async() => {
    if(!player||!line) return;
    setLoading(true); setError(""); setDebug(""); setGameLog([]); setH2hActive("");
    try {
      const curSeason = getCurrentSeason(sport);
      let seasons = scope==="lifetime"
        ? [curSeason, curSeason-1, curSeason-2]
        : [curSeason];

      setDebug(`Fetching ${sport} data for season(s): ${seasons.join(", ")}...`);
      let log=[];
      if(sport==="NBA")      log = await fetchNBASeasons(player.id, seasons);
      else if(sport==="MLB") log = await fetchMLBSeasons(player.id, mlbGrp, seasons);
      else                   log = await fetchNHLSeasons(player.id, seasons);

      setDebug(`Loaded ${log.length} games.`);
      if(!log.length) throw new Error(`No game data found. Season ${curSeason} may not have started yet or no games played.`);
      setGameLog(log);
    } catch(e){ setError(e.message); }
    finally{ setLoading(false); }
  };

  const applyH2H = () => setH2hActive(h2hInput.trim());
  const clearH2H = () => { setH2hActive(""); setH2hInput(""); };

  const getVal = game => {
    try { return sport==="MLB" ? statList[statIdx].calc(game.stat) : statList[statIdx].calc(game); }
    catch { return null; }
  };

  const lineNum    = parseFloat(line);
  const hasData    = gameLog.length > 0 && statList[statIdx] && !isNaN(lineNum);
  const l10Games   = hasData ? gameLog.slice(0,10) : [];
  const seasonGames= hasData ? gameLog : [];
  const h2hGames   = hasData && h2hActive ? gameLog.filter(g=>oppMatch(g,h2hActive)) : [];

  const l10Stats    = hasData ? hitRate(l10Games, getVal, lineNum, ou) : null;
  const seasonStats = hasData ? hitRate(seasonGames, getVal, lineNum, ou) : null;
  const h2hStats    = h2hGames.length ? hitRate(h2hGames, getVal, lineNum, ou) : null;

  const displayGames = gameLog.slice(0,25);

  return (
    <div style={{minHeight:"100vh",background:"#0a0d0f",backgroundImage:"radial-gradient(ellipse at 20% 0%,rgba(0,200,100,0.05) 0%,transparent 50%)",padding:"24px 16px",display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:580}}>

        {/* Header */}
        <div style={{marginBottom:28,textAlign:"center"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>
            HIT RATE <span style={{color:"#00dc6e"}}>CHECKER</span>
          </div>
          <div style={{marginTop:8,fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:"2px",textTransform:"uppercase"}}>
            The +EV Cave · Paid Member Tool
          </div>
        </div>

        {/* Sport */}
        <div className="card">
          <div className="label-sm">SELECT SPORT</div>
          <div style={{display:"flex"}}>
            {["NBA","MLB","NHL"].map(s=>(
              <button key={s} className={"sport-btn"+(sport===s?" active":"")} onClick={()=>setSport(s)}>{s}</button>
            ))}
          </div>
        </div>

        {/* MLB type */}
        {sport==="MLB"&&(
          <div className="card">
            <div className="label-sm">PLAYER TYPE</div>
            <div style={{display:"flex"}}>
              <button className={"sport-btn"+(mlbGrp==="hitting"?" active":"")} onClick={()=>setMlbGrp("hitting")}>HITTER</button>
              <button className={"sport-btn"+(mlbGrp==="pitching"?" active":"")} onClick={()=>setMlbGrp("pitching")}>PITCHER</button>
            </div>
          </div>
        )}

        {/* Scope toggle */}
        <div className="card">
          <div className="label-sm">DATA RANGE</div>
          <div className="toggle-row">
            <button className={"toggle-pill"+(scope==="season"?" active":"")} onClick={()=>setScope("season")}>
              CURRENT SEASON
            </button>
            <button className={"toggle-pill"+(scope==="lifetime"?" active":"")} onClick={()=>setScope("lifetime")}>
              LAST 3 SEASONS
            </button>
          </div>
        </div>

        {/* Player search */}
        <div className="card">
          <div className="label-sm">PLAYER SEARCH</div>
          <div className="search-wrap" ref={wrap}>
            <input className="tool-input" type="text"
              placeholder={`Type ${sport} player name...`}
              value={query} onChange={e=>handleQuery(e.target.value)}
              onFocus={()=>results.length&&setShowDrop(true)}/>
            {searching&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)"}}>
              <div className="spinner" style={{width:16,height:16,borderWidth:2}}/>
            </div>}
            {showDrop&&results.length>0&&(
              <div className="dropdown">
                {results.map(p=>(
                  <div key={p.id} className="dropdown-item" onMouseDown={()=>selectPlayer(p)}>
                    <div>{p.name}</div>
                    {p.sub&&<div className="sub">{p.sub}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
          {player&&<div style={{marginTop:8,fontSize:11,color:"#00dc6e"}}>✓ {player.name}{player.sub?` · ${player.sub}`:""}</div>}
        </div>

        {/* Stat */}
        <div className="card">
          <div className="label-sm">STAT CATEGORY</div>
          <select className="stat-select" value={statIdx} onChange={e=>setStatIdx(parseInt(e.target.value))}>
            {statList.map((s,i)=><option key={i} value={i}>{s.label}</option>)}
          </select>
        </div>

        {/* Line */}
        <div className="card">
          <div className="label-sm">PROJECTION LINE</div>
          <div style={{display:"flex",gap:10}}>
            <input className="tool-input" type="number" step="0.5" placeholder="e.g. 13.5"
              value={line} onChange={e=>setLine(e.target.value)} style={{flex:1}}/>
            <div style={{display:"flex"}}>
              <button className={"ou-btn ou-over"+(ou==="over"?" active":"")} onClick={()=>setOu("over")}>OVER</button>
              <button className={"ou-btn ou-under"+(ou==="under"?" active":"")} onClick={()=>setOu("under")}>UNDER</button>
            </div>
          </div>
        </div>

        {error&&<div className="error-box">{error}</div>}
        {!error&&debugInfo&&<div className="debug-box">{debugInfo}</div>}

        <button className="check-btn" onClick={checkHistory}
          disabled={!player||!line||isNaN(lineNum)||loading}>
          {loading?"FETCHING DATA...":"CHECK HISTORY"}
        </button>

        {loading&&<div style={{textAlign:"center",padding:"30px 0"}}>
          <div className="spinner"/>
          <div style={{marginTop:12,fontSize:11,color:"rgba(255,255,255,0.3)"}}>
            {scope==="lifetime"?"Loading last 3 seasons of data...":"Loading current season data..."}
          </div>
        </div>}

        {/* Results */}
        {hasData&&!loading&&(
          <>
            {/* Rate cards */}
            <div className="card">
              <div className="section-title">
                {player.name} · {statList[statIdx].label} {ou==="over"?"Over":"Under"} {lineNum}
                <span style={{marginLeft:8,fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:400}}>
                  ({gameLog.length} games)
                </span>
              </div>
              <div style={{display:"flex",gap:8}}>
                <RateCard label="LAST 10" data={l10Stats}/>
                <RateCard label={scope==="lifetime"?"LAST 3 SEASONS":"SEASON"} data={seasonStats}/>
                <RateCard label={"H2H"+(h2hActive?` vs ${h2hActive.toUpperCase()}`:"")}
                  data={h2hStats} empty={h2hActive?"No games found":"Set below"}/>
              </div>
            </div>

            {/* H2H filter */}
            <div className="card">
              <div className="label-sm">H2H OPPONENT FILTER</div>
              <div style={{display:"flex",gap:8}}>
                <input className="tool-input" type="text"
                  placeholder="Team name or abbreviation, e.g. Yankees or NYY"
                  value={h2hInput} onChange={e=>setH2hInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&applyH2H()}
                  style={{flex:1}}/>
                <button className="sec-btn" onClick={applyH2H}>APPLY</button>
                {h2hActive&&<button className="sec-btn" style={{background:"rgba(255,77,77,0.08)",borderColor:"rgba(255,77,77,0.3)",color:"#ff6b6b"}} onClick={clearH2H}>CLEAR</button>}
              </div>
              {h2hActive&&(
                <div style={{marginTop:8,fontSize:11,color:h2hGames.length?"#00dc6e":"rgba(255,77,77,0.7)"}}>
                  {h2hGames.length?`Found ${h2hGames.length} games vs "${h2hActive}"`:`No games found vs "${h2hActive}". Try a different spelling.`}
                </div>
              )}
            </div>

            {/* Game log */}
            <div className="card">
              <div className="section-title">Game Log</div>
              {displayGames.map((game,i)=>{
                const val  = getVal(game);
                const hit  = val!=null&&!isNaN(val)&&(ou==="over"?val>lineNum:val<lineNum);
                const date = (game._date||"").toString().slice(0,10);
                const opp  = game._opp||"";
                const isH2H = h2hActive && oppMatch(game, h2hActive);
                return (
                  <div key={i} className="game-row"
                    style={isH2H?{background:"rgba(0,220,110,0.04)",borderRadius:2,paddingLeft:4,paddingRight:4}:{}}>
                    <div className={`hit-dot ${val!=null&&!isNaN(val)?(hit?"dot-hit":"dot-miss"):"badge-neutral"}`}/>
                    <div style={{flex:1,color:"rgba(255,255,255,0.4)",fontSize:11}}>
                      {date}{opp?` vs ${opp}`:""}
                      {game._season&&scope==="lifetime"&&<span style={{marginLeft:6,fontSize:9,color:"rgba(255,255,255,0.2)"}}>{game._season}</span>}
                      {isH2H&&<span style={{marginLeft:6,fontSize:9,color:"#00dc6e",fontWeight:700}}>H2H</span>}
                    </div>
                    <div style={{fontWeight:700,fontSize:13,color:val!=null&&!isNaN(val)?(hit?"#00dc6e":"#ff6b6b"):"rgba(255,255,255,0.3)"}}>
                      {val!=null&&!isNaN(val)?val:"—"}
                    </div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",width:36,textAlign:"right"}}>
                      {val!=null&&!isNaN(val)?(hit?"HIT":"MISS"):""}
                    </div>
                  </div>
                );
              })}
              {gameLog.length>25&&(
                <div style={{textAlign:"center",paddingTop:10,fontSize:10,color:"rgba(255,255,255,0.3)"}}>
                  Showing 25 of {gameLog.length} games
                </div>
              )}
            </div>
          </>
        )}

        <div style={{marginTop:12,textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.15)",letterSpacing:"1px",paddingBottom:24}}>
          THE +EV CAVE · PAID MEMBER TOOL · NOT FINANCIAL ADVICE
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HitRateChecker/>);
</script>
</body>
</html>
